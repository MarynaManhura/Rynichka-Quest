*{margin:0;padding:0;box-sizing:border-box;}
:root{--sea:#1f7a8c;--sea-d:#0e5c6e;--azure:#3a9bb5;--gold:#b8975a;--coral:#dd8264;
--cream:#fffdf7;--ink:#1f4a52;--ink-soft:#6a8389;}
@page{size:A4 landscape;margin:14mm;}
body{font-family:'Montserrat',sans-serif;background:#e7eef0;color:var(--ink);}
.wrap{width:1000px;margin:24px auto;}
.card{display:flex;height:400px;border-radius:18px;overflow:hidden;
background:linear-gradient(168deg,#fdf3da,#f6edda);
box-shadow:0 20px 50px rgba(31,90,100,.22);position:relative;}
.stripe{position:absolute;top:0;left:0;width:100%;height:11px;z-index:5;}
.main{flex:1;padding:44px 40px 30px;display:flex;flex-direction:column;}
.head{display:flex;align-items:center;gap:14px;}
.head .plane{color:var(--gold);font-size:30px;}
.head .title{font-family:'Marcellus',serif;font-size:24px;letter-spacing:6px;color:var(--ink);}
.sub{font-family:'Marcellus',serif;font-size:11px;letter-spacing:3px;color:var(--coral);margin-top:4px;text-transform:uppercase;}
.teaser{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:40px;color:var(--sea-d);
font-weight:600;margin:auto 0 18px;line-height:1.15;}
.row{display:flex;gap:40px;border-top:1px solid rgba(184,151,90,.4);padding-top:18px;}
.f .l{font-size:9px;letter-spacing:2px;color:var(--ink-soft);text-transform:uppercase;}
.f .v{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:22px;color:var(--ink);margin-top:2px;}
.stub{flex:0 0 300px;background:linear-gradient(165deg,var(--sea),var(--sea-d));color:#fff;
padding:36px 28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;}
.stub::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;
background-image:radial-gradient(circle,#f6edda 2.5px,transparent 3px);background-size:2px 15px;background-repeat:repeat-y;}
.qrbox{background:#fff;padding:16px;border-radius:14px;box-shadow:0 8px 22px rgba(0,0,0,.18);}
.qrbox img{width:170px;height:170px;display:block;}
.scan{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;margin-top:18px;}
.scan small{display:block;font-family:'Montserrat';font-size:10px;letter-spacing:2px;opacity:.8;margin-top:6px;font-weight:300;}
.note{text-align:center;color:#7a8890;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;margin-top:18px;}
@media print{body{background:#fff;}.wrap{margin:0;width:100%;}.note{display:none;}.card{box-shadow:none;}}
